name: Yank a published version
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to yank (e.g. 1.3.0-research.0)"
        required: true
        type: string
permissions:
  contents: read
jobs:
  yank:
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - name: Yank
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          cargo yank --version "${{ inputs.version }}" greentic-deploy-spec
          echo "Yanked greentic-deploy-spec ${{ inputs.version }}"
